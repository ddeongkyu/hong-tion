services:
  postgres-test:
    image: postgres:16-alpine
    container_name: hongtion-postgres-test
    environment:
      POSTGRES_DB: hongtion_api_test
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hongtion_api_test"]
      interval: 2s
      timeout: 5s
      retries: 20
    ports:
      - "55432:5432"
